  <iframe
    allow="fullscreen"
    style="width:100vw;height:100vh;border:0"
    srcdoc='
      <!doctype html>
      <button id="btn">Enter fullscreen</button>
      <script>
        document.getElementById("btn").onclick = async function () {
          await document.documentElement.requestFullscreen();
        };
      </script>
    '>
  </iframe>
