<!doctype html>
<html>
<body style="margin:0;font-family:sans-serif;">

<button id="open">Click For Autofill</button>

<iframe
  id="frame"
  style="width:100%;height:260px;border:1px solid #ccc;margin-top:12px;"
></iframe>

<script>
const src = `
<!doctype html>
<html>
<body style="font-family:sans-serif;padding:20px;">

<input
  id="email"
  type="email"
  autocomplete="email"
  placeholder="Email"
  style="font-size:18px;padding:10px;width:90%;"
/>

<script>
window.addEventListener('message', e => {
  if (e.data === 'focusEmail') {
    const input = document.getElementById('email');
    input.focus();
    input.click();
  }
});
<\/script>

</body>
</html>
`;

frame.srcdoc = src;

open.onclick = () => {
  frame.contentWindow.postMessage("focusEmail", "*");
};
</script>

</body>
</html>
