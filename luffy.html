<!doctype html>
<meta charset="utf-8">
<title>clipboard iframe child</title>

<style>
body {
  font: 18px system-ui, sans-serif;
  margin: 20px;
}

button {
  font: inherit;
  padding: 16px 24px;
}

#output {
  margin-top: 20px;
  padding: 16px;
  border: 1px solid #ccc;
  background: #f6f6f6;
  white-space: pre-wrap;
  word-break: break-word;
}
</style>

<button id="read" autofocus>Read clipboard</button>

<h2>clipboard iframe child</h2>
<p id="origin"></p>

<h3>Clipboard content:</h3>
<div id="output">No clipboard read yet.</div>

<script>
document.getElementById('origin').textContent = location.origin;

async function run() {
  const output = document.getElementById('output');

  parent.postMessage({
    event: 'child requesting clipboard',
    origin: location.origin
  }, '*');

  try {
    const text = await navigator.clipboard.readText();

    output.textContent = text || '[Clipboard is empty]';

    parent.postMessage({
      event: 'child clipboard resolved',
      length: text.length,
      origin: location.origin
    }, '*');

  } catch (err) {
    output.textContent = 'Clipboard read failed: ' + err.name + ' - ' + err.message;

    parent.postMessage({
      event: 'child clipboard error',
      name: err.name,
      message: err.message,
      origin: location.origin
    }, '*');
  }
}

window.addEventListener('message', event => {
  if (event.data && event.data.cmd === 'clipboard') {
    run();
  }
});

document.getElementById('read').onclick = run;
</script>
