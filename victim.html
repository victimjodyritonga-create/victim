<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Victim Page</title>
<style>
  html, body { margin: 0; font-family: system-ui, sans-serif; }
  #head { position: sticky; top: 0; background: #0d3b66; color: #fff; padding: 10px; z-index: 9; }
  #content { min-height: 140vh; background: linear-gradient(180deg, #d8f3ff, #f3f8ff); padding: 14px; }
  #dialog { position: fixed; inset: auto 20px 20px 20px; background: #fff; border: 2px solid #333; padding: 10px; display: none; z-index: 9999; }
  .big { position: fixed; left: 0; right: 0; bottom: 0; height: 74px; background: rgba(255, 184, 0, .92); display: grid; place-items: center; font-weight: 700; }
</style>
<div id="head">Victim origin: <span id="o"></span></div>
<div id="content">
  <p>This is a controlled victim frame for cross-origin UI sequencing tests.</p>
  <button id="show">Show in-page overlay</button>
  <button id="modal">Toggle fixed pseudo-modal</button>
  <div class="big">Victim sticky bar</div>
</div>
<div id="dialog">Victim pseudo-modal (content area only)</div>
<script>
(() => {
  const send = (kind, extra={}) => {
    try {
      parent.postMessage({
        kind: 'victim',
        event: kind,
        at: Date.now(),
        origin: location.origin,
        href: location.href,
        ...extra
      }, '*');
    } catch (_) {}
  };
  document.getElementById('o').textContent = location.origin;
  window.addEventListener('load', () => send('load'));
  document.addEventListener('visibilitychange', () => send('visibility', { state: document.visibilityState }));
  window.addEventListener('focus', () => send('focus'));
  window.addEventListener('blur', () => send('blur'));
  window.addEventListener('pagehide', () => send('pagehide'));

  document.getElementById('show').onclick = () => {
    const d = document.createElement('div');
    d.style.position = 'fixed';
    d.style.left = '8px';
    d.style.top = '8px';
    d.style.padding = '8px';
    d.style.background = '#111';
    d.style.color = '#fff';
    d.style.zIndex = 99999;
    d.textContent = 'victim temp overlay';
    document.body.appendChild(d);
    send('overlay-shown');
    setTimeout(() => d.remove(), 1000);
  };

  document.getElementById('modal').onclick = () => {
    const m = document.getElementById('dialog');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
    send('modal-toggle', { shown: m.style.display !== 'none' });
  };

  send('ready');
})();
</script>
</html>
