  <!doctype html>
  <meta charset="utf-8">
  <title>dialog suppression target</title>
  <pre id="log"></pre>
  <script>
  const params = new URLSearchParams(location.search);
  const runId = params.get("run") || Date.now();
  function note(data) {
    data.href = location.href;
    data.origin = location.origin;
    log.textContent += JSON.stringify(data) + "\n";
    fetch("http://localhost:8777/log", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    }).catch(() => {});
  }
  note({ test: "dialog-suppression", phase: "target-loaded", runId });
  setTimeout(() => {
    note({ test: "dialog-suppression", phase: "target-alert-before", runId });
    alert("target origin dialog should still appear");
    note({ test: "dialog-suppression", phase: "target-alert-after", runId });
  }, 250);
  </script>
